# ──────────────────────────────────────────────────────────
# AURA Configuration
# ──────────────────────────────────────────────────────────

# [REQUIRED]
aura:
  name: "AURA"
  version: "2.0"
  mode: "offline"
  language: "en"
  cli_mode: true

# [REQUIRED]
sandbox:
  base_dir: "~/AURA_SANDBOX"

# [REQUIRED]
paths:
  protected:
    - "C:/Windows"
    - "C:/Windows/System32"
    - "C:/Program Files"
    - "C:/Program Files (x86)"
    - "/bin"
    - "/usr"
    - "/etc"
    - "/sbin"
    - "/boot"
    - "/System"
    - "/Library"

# [REQUIRED]
logging:
  file: "logs/aura.log"
  level: "INFO"
  format: "json"
  max_bytes: 5242880
  backup_count: 3
  benchmark: false
  trace: false

# [REQUIRED]
shell:
  timeout: 120
  allowed_commands:
    - "git"
    - "npm"
    - "docker"
    - "echo"
    - "ls"
    - "dir"
    - "pwd"

# [REQUIRED]
system_check:
  tools:
    - "git"
    - "node"
    - "docker"
    - "npm"

# [REQUIRED]
permissions:
  source_limits:
    cli: "CRITICAL"
    llm: "MEDIUM"
    planner: "HIGH"
    auto: "LOW"

# [REQUIRED]
rate_limit:
  max_per_minute: 60
  repeat_threshold: 10
  sources:
    cli:     {max_per_minute: 120, repeat_threshold: 20}
    llm:     {max_per_minute: 30,  repeat_threshold: 5}
    planner: {max_per_minute: 240, repeat_threshold: 30}

# [REQUIRED]
safety:
  confirm_timeout: 8
  auto_confirm: false

# [REQUIRED]
audit:
  file: "logs/audit.log"
  max_bytes: 5242880
  backup_count: 5

# ──────────────────────────────────────────────────────────
# Phase 2 — Intelligence Layer
# ──────────────────────────────────────────────────────────

models:
  fast:       "llama3.2:3b-q4_0"
  general:    "mistral:7b-instruct-q4_0"
  reasoning:  "llama3:8b-q4_0"
  code:       "deepseek-coder:7b-q4_0"
  vision:     "llava:7b"
  embeddings: "nomic-embed-text"

stt:
  engine:          "whisper"
  model:           "base"
  silence_timeout: 2.0
  max_recording:   30

tts:
  engine:   "piper"
  voice:    "en_US-lessac-medium"
  fallback: "pyttsx3"

routing:
  complexity_threshold:     50
  rag_confidence_threshold: 0.72
  realtime_warning:         true
  fallback_model:           "mistral:7b-instruct-q4_0"
  intent_timeout_seconds:   10
  intent_max_retries:       3

ollama:
  base_url: "http://localhost:11434"
  timeout:  60
  retries:  3
