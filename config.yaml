# ──────────────────────────────────────────────────────────
# AURA Configuration
# ──────────────────────────────────────────────────────────

# [REQUIRED]
aura:
  name: "AURA"
  version: "2.0"
  mode: "offline"
  language: "en"
  cli_mode: true

# [REQUIRED]
sandbox:
  base_dir: "~/AURA_SANDBOX"

# [REQUIRED]
paths:
  protected:
    - "C:/Windows"
    - "C:/Windows/System32"
    - "C:/Program Files"
    - "C:/Program Files (x86)"
    - "/bin"
    - "/usr"
    - "/etc"
    - "/sbin"
    - "/boot"
    - "/System"
    - "/Library"

# [REQUIRED]
logging:
  file: "logs/aura.log"
  level: "INFO"
  format: "json"
  max_bytes: 5242880
  backup_count: 3
  benchmark: false
  trace: false

# [REQUIRED]
shell:
  timeout: 120
  allowed_commands:
    - "git"
    - "npm"
    - "docker"
    - "echo"
    - "ls"
    - "dir"
    - "pwd"

# [REQUIRED]
system_check:
  tools:
    - "git"
    - "node"
    - "docker"
    - "npm"

# [REQUIRED]
permissions:
  source_limits:
    cli: "CRITICAL"
    llm: "MEDIUM"
    planner: "HIGH"
    auto: "LOW"

# [REQUIRED]
rate_limit:
  max_per_minute: 60
  repeat_threshold: 10
  sources:
    cli: { max_per_minute: 120, repeat_threshold: 20 }
    llm: { max_per_minute: 30, repeat_threshold: 5 }
    planner: { max_per_minute: 240, repeat_threshold: 30 }

# [REQUIRED]
safety:
  confirm_timeout: 8
  auto_confirm: false

# [REQUIRED]
audit:
  file: "logs/audit.log"
  max_bytes: 5242880
  backup_count: 5

# ──────────────────────────────────────────────────────────
# Phase 2 — Intelligence Layer
# ──────────────────────────────────────────────────────────

models:
  fast:       "llama3.2:1b"
  general:    "llama3.2:1b"
  reasoning:  "llama3.2:3b"
  code:       "deepseek-coder:6.7b"
  vision:     "llava:7b"
  embeddings: "nomic-embed-text:latest"

routing:
  complexity_threshold:      50
  rag_confidence_threshold:  0.72
  realtime_warning:          true
  intent_timeout_seconds:    10
  intent_max_retries:        3

stt:
  model:           "tiny"
  silence_timeout: 1.0
  max_recording:   10

wake_word:
  engine:            "whisper"      # "whisper" (recommended) or "oww" (openwakeword)
  phrases:                          # what to say to wake AURA (Whisper engine)
    - "hey jarvis"
    - "jarvis"
  listen_duration:   1.5            # seconds to record when voice detected
  vad_threshold:     0.008          # mic RMS above this = speech detected
  vad_pre_frames:    3              # consecutive speech frames before recording
  input_device:      null           # null = auto-pick; or device index
  debug_scores:      true           # print voice-activity and transcription

  # openwakeword fallback (Tier 2)
  oww_model:         "hey_jarvis"
  oww_threshold:     0.05
  oww_patience:      1
  oww_chunk_ms:      80

tts:
  offline_engine: "piper"
  online_engine:  "edge-tts"
  piper_voice:    "en_US-lessac-medium"

memory:
  persist_path: ".aura/memory"
  max_results:  3
  purge_days:   90

ollama:
  base_url: "http://localhost:11434"
  timeout:  120
  retries:  2
  keep_alive: "10m"
