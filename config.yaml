# ──────────────────────────────────────────────────────────
# AURA Configuration
# ──────────────────────────────────────────────────────────

# [REQUIRED]
aura:
  name: "AURA"
  version: "1.0"
  mode: "offline"
  language: "en"
  cli_mode: true
  assistant_name: "Kommy"

# [REQUIRED]
sandbox:
  base_dir: "~/AURA_SANDBOX"

# [REQUIRED]
paths:
  protected:
    - "C:/Windows"
    - "C:/Windows/System32"
    - "C:/Program Files"
    - "C:/Program Files (x86)"
    - "/bin"
    - "/usr"
    - "/etc"
    - "/sbin"
    - "/boot"
    - "/System"
    - "/Library"

# [REQUIRED]
logging:
  file: "logs/aura.log"
  level: "INFO"
  format: "json"
  max_bytes: 5242880
  backup_count: 3
  benchmark: false
  trace: false

# [REQUIRED]
shell:
  timeout: 120
  allowed_commands:
    - "git"
    - "npm"
    - "docker"
    - "echo"
    - "ls"
    - "dir"
    - "pwd"

# [REQUIRED]
system_check:
  tools:
    - "git"
    - "node"
    - "docker"
    - "npm"

# [REQUIRED]
permissions:
  source_limits:
    cli: "CRITICAL"
    llm: "MEDIUM"
    planner: "HIGH"
    auto: "LOW"

# [REQUIRED]
rate_limit:
  max_per_minute: 60
  repeat_threshold: 10
  sources:
    cli: { max_per_minute: 120, repeat_threshold: 20 }
    llm: { max_per_minute: 30, repeat_threshold: 5 }
    planner: { max_per_minute: 240, repeat_threshold: 30 }

# [REQUIRED]
safety:
  confirmation_timeout: 8
  auto_confirm: false
  audit_log: "logs/safety_audit.log"
  confirm_words: ["yes", "confirm", "do it", "proceed"]

# [REQUIRED]
audit:
  file: "logs/audit.log"
  max_bytes: 5242880
  backup_count: 5

# ──────────────────────────────────────────────────────────
# Phase 2 — Intelligence Layer
# ──────────────────────────────────────────────────────────

models:
  fast:       "llama3.2:3b-q4_0"
  general:    "mistral:7b-instruct-q4_0"
  reasoning:  "llama3:8b-q4_0"
  code:       "deepseek-coder:7b-q4_0"
  vision:     "llava:7b"
  embeddings: "nomic-embed-text"

routing:
  complexity_threshold:      50
  rag_confidence_threshold:  0.72
  realtime_warning:          true
  intent_timeout_seconds:    10
  intent_max_retries:        3
  fast_confidence:           0.85
  fallback_confidence:       0.3

stt:
  model:                  "base"
  silence_timeout:        2.0
  max_recording:          30
  rms_silence_threshold:  0.003

wake_word:
  engine:            "whisper"
  phrases:
    - "hey kommy"
    - "kommy"
  listen_duration:   1.5
  vad_threshold:     0.008
  vad_pre_frames:    3
  input_device:      null
  debug_scores:      true
  no_speech_threshold: 0.3

  # openwakeword fallback (Tier 2)
  # TODO: A custom "Hey Kommy" wake word model needs to be trained/downloaded.
  #       The "hey_jarvis" model is a placeholder — it does NOT respond to "Hey Kommy".
  #       Once a trained model is available, update oww_model to point to the new .onnx file.
  oww_model:         "hey_jarvis"
  oww_threshold:     0.05
  oww_patience:      1
  oww_chunk_ms:      80

tts:
  offline_engine: "piper"
  online_engine:  "edge-tts"
  piper_voice:    "en_US-lessac-medium"
  edge_voice:     "en-US-GuyNeural"

memory:
  persist_path: ".aura/memory"
  max_results:  3
  purge_days:   90

ollama:
  base_url: "http://localhost:11434"
  timeout:  60
  retries:  3
  keep_alive: "10m"
  health_check_timeout: 5

connectivity:
  poll_interval: 30

# ── Session management ────────────────────────────────────────────────
session:
  inactivity_timeout_minutes: 10     # go to sleep after this many minutes of silence
  echo_prevention_seconds:    0.5    # pause after TTS before listening for next command
  wake_rearm_delay_seconds:   3.0    # delay before WakeWordListener re-arms after sleep

# ── Executor settings ──────────────────────────────────────────────────
executors:
  shell_timeout:   30      # seconds before a shell command is killed
  system_timeout:  10      # seconds before a system command is killed

# ── System command settings ───────────────────────────────────────────
system:
  screenshots_dir: "~/Pictures/AURA/screenshots"
  shutdown_delay:  0       # seconds delay before shutdown/restart executes
