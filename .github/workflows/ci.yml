name: AURA CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libportaudio2 portaudio19-dev libgomp1 ffmpeg

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install flake8 pytest
          pip install -r requirements.txt

      - name: Install Ollama and pull embedding model
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve > /tmp/ollama.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null; then
              echo "Ollama ready after ${i} attempts"
              break
            fi
            sleep 2
          done
          curl -sf http://localhost:11434/api/tags
          ollama pull nomic-embed-text
          ollama pull llama3.2:3b

      - name: Run linter
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --junitxml=test-results.xml

      - name: Run all tests
        run: pytest tests/ -q

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          if [ -f test-results.xml ]; then
            TESTS=$(grep -oP 'tests="\K[^"]+' test-results.xml || echo "?")
            FAILURES=$(grep -oP 'failures="\K[^"]+' test-results.xml || echo "?")
            ERRORS=$(grep -oP 'errors="\K[^"]+' test-results.xml || echo "?")
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Tests  | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
          fi
