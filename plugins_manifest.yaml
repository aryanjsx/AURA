# AURA — Plugin Safety Manifest (SOURCE OF TRUTH).
# ──────────────────────────────────────────────────────────

version: 1

plugins:
  system:
    actions:
      file.create:
        permission_level: MEDIUM
        destructive: false
        audit_events:
          - command.executing
          - command.completed

      file.delete:
        permission_level: HIGH
        destructive: true
        audit_events:
          - command.destructive
          - command.executing
          - command.completed
          - command.error

      file.rename:
        permission_level: MEDIUM
        destructive: true
        audit_events:
          - command.destructive
          - command.executing
          - command.completed
          - command.error

      file.move:
        permission_level: MEDIUM
        destructive: true
        audit_events:
          - command.destructive
          - command.executing
          - command.completed
          - command.error

      file.search:
        permission_level: LOW
        destructive: false
        audit_events:
          - command.executing
          - command.completed

      process.shell:
        permission_level: CRITICAL
        destructive: true
        audit_events:
          - command.destructive
          - command.executing
          - command.completed
          - command.error
          - policy.blocked

      process.list:
        permission_level: LOW
        destructive: false
        audit_events:
          - command.executing
          - command.completed

      process.kill:
        permission_level: HIGH
        destructive: true
        audit_events:
          - command.destructive
          - command.executing
          - command.completed
          - command.error

      system.cpu:
        permission_level: LOW
        destructive: false
        audit_events:
          - command.executing
          - command.completed

      system.ram:
        permission_level: LOW
        destructive: false
        audit_events:
          - command.executing
          - command.completed

      system.health:
        permission_level: LOW
        destructive: false
        audit_events:
          - command.executing
          - command.completed

      project.create:
        permission_level: MEDIUM
        destructive: false
        audit_events:
          - command.executing
          - command.completed

      log.show:
        permission_level: LOW
        destructive: false
        audit_events:
          - command.executing
          - command.completed

      npm.install:
        permission_level: HIGH
        destructive: true
        audit_events:
          - command.destructive
          - command.executing
          - command.completed
          - command.error

      npm.run:
        permission_level: HIGH
        destructive: true
        audit_events:
          - command.destructive
          - command.executing
          - command.completed
          - command.error
