# ──────────────────────────────────────────────────────────
# AURA Configuration
# ──────────────────────────────────────────────────────────

# [REQUIRED]
aura:
  name: "AURA"
  version: "2.0"
  mode: "offline"
  language: "en"
  cli_mode: true

# [REQUIRED]
sandbox:
  base_dir: "~/AURA_SANDBOX"

# [REQUIRED]
paths:
  protected:
    - "C:/Windows"
    - "C:/Windows/System32"
    - "C:/Program Files"
    - "C:/Program Files (x86)"
    - "/bin"
    - "/usr"
    - "/etc"
    - "/sbin"
    - "/boot"
    - "/System"
    - "/Library"

# [REQUIRED]
logging:
  file: "logs/aura.log"
  level: "INFO"
  format: "json"
  max_bytes: 5242880
  backup_count: 3
  benchmark: false
  trace: false

# [REQUIRED]
shell:
  timeout: 120
  allowed_commands:
    - "git"
    - "npm"
    - "docker"
    - "echo"
    - "ls"
    - "dir"
    - "pwd"

# [REQUIRED]
system_check:
  tools:
    - "git"
    - "node"
    - "docker"
    - "npm"

# [REQUIRED]
permissions:
  source_limits:
    cli: "CRITICAL"
    llm: "MEDIUM"
    planner: "HIGH"
    auto: "LOW"

# [REQUIRED]
rate_limit:
  max_per_minute: 60
  repeat_threshold: 10
  sources:
    cli: { max_per_minute: 120, repeat_threshold: 20 }
    llm: { max_per_minute: 30, repeat_threshold: 5 }
    planner: { max_per_minute: 240, repeat_threshold: 30 }

# [REQUIRED]
safety:
  confirmation_timeout: 8
  auto_confirm: false
  audit_log: "logs/safety_audit.log"

# [REQUIRED]
audit:
  file: "logs/audit.log"
  max_bytes: 5242880
  backup_count: 5

# ──────────────────────────────────────────────────────────
# Phase 2 — Intelligence Layer
# ──────────────────────────────────────────────────────────

models:
  fast: "llama3.2:3b"
  general: "mistral:7b-instruct-q4_0"
  code: "deepseek-coder:6.7b"
  reasoning: "llama3.1:8b"
  vision: "llava:7b"
  embeddings: "nomic-embed-text"

stt:
  engine: "whisper"
  model: "base"
  silence_timeout: 2.0
  max_recording: 30

tts:
  offline_engine: "piper"
  online_engine:  "edge-tts"
  piper_voice:    "en_US-lessac-medium"
  edge_voice:     "en-US-GuyNeural"

routing:
  complexity_threshold: 50
  rag_confidence_threshold: 0.50   # nomic-embed-text cosine sim (~0.55–0.65); 0.72 was for a different model distribution
  rag_rank_margin: 0.03             # drop rank-2+ chunks more than this below top-1 similarity
  realtime_warning: true
  fallback_model: "mistral:7b-instruct-q4_0"
  intent_timeout_seconds: 10
  intent_max_retries: 3
  fast_confidence: 0.85       # confidence assigned to regex fast-path matches
  fallback_confidence: 0.3    # confidence when LLM classification fails → UNKNOWN

memory:
  persist_path: ".aura/memory"
  max_results: 3
  purge_days: 90

browser:
  timeout: 15

wake_word:
  engine: "whisper"
  phrases:
    - "hey kommy"
    - "kommy"
  no_speech_threshold: 0.3    # Whisper VAD threshold for wake-word transcription

ollama:
  base_url: "http://localhost:11434"
  timeout: 60
  retries: 3
  health_check_timeout: 5     # seconds for /api/tags reachability probe
