# Config with the 'aura' top-level section removed — must trigger ConfigError.

sandbox:
  base_dir: "~/AURA_SANDBOX"

paths:
  protected:
    - "C:/Windows"

logging:
  file: "logs/aura.log"
  level: "INFO"
  max_bytes: 5242880
  backup_count: 3

shell:
  timeout: 120
  allowed_commands:
    - "git"

permissions:
  source_limits:
    cli: "CRITICAL"

rate_limit:
  max_per_minute: 60
  repeat_threshold: 10

safety:
  confirm_timeout: 8

audit:
  file: "logs/audit.log"
  max_bytes: 5242880
  backup_count: 5
