aura:
  name: "AURA"
  version: "2.0"
  mode: "offline"

sandbox:
  base_dir: "~/AURA_SANDBOX"

paths:
  protected:
    - "C:/Windows"
    - "C:/Windows/System32"
    - "C:/Program Files"
    - "/bin"
    - "/usr"
    - "/etc"

logging:
  file: "logs/aura.log"
  level: "INFO"
  format: "json"
  max_bytes: 5242880
  backup_count: 3

shell:
  timeout: 120
  allowed_commands:
    - "git"
    - "npm"
    - "docker"
    - "echo"

system_check:
  tools:
    - "git"
    - "node"

permissions:
  source_limits:
    cli: "CRITICAL"
    llm: "MEDIUM"

rate_limit:
  max_per_minute: 60
  repeat_threshold: 10

safety:
  confirm_timeout: 8
  auto_confirm: false

audit:
  file: "logs/audit.log"
  max_bytes: 5242880
  backup_count: 5

models:
  fast: "llama3.2:3b"
  general: "llama3.2:3b"
  code: "deepseek-coder:6.7b"

routing:
  intent_timeout_seconds: 10
  intent_max_retries: 3

stt:
  model: "tiny"
  silence_timeout: 1.0
  max_recording: 10

tts:
  offline_engine: "piper"

ollama:
  base_url: "http://localhost:11434"
  timeout: 120
  retries: 2
